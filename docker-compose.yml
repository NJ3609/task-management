version: '3.8'

services:
  app:
    build: .
    container_name: task-management-api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/taskmanagement
      - JWT_SECRET=replace_with_a_long_random_secret
      - JWT_EXPIRES_IN=1d
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: task-management-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
